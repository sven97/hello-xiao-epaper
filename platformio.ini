; Bare `pio run` / `pio run -t upload` target the firmware only; the native
; env is test-only (no sources to link) and is reached via `pio test -e native`.
[platformio]
default_envs = ee02

; Shared by the eeXX firmware envs below via `extends = xiao_base`. Not an
; [env] section on purpose: PlatformIO's special [env] section is inherited
; by *every* environment including [env:native], which must NOT get an
; ESP32 board/framework/lib_deps.
[xiao_base]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; XIAO ESP32-S3 Plus has 16 MB flash (stock board def assumes 8 MB)
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git#a2de1abca0597c202193f22d01e9fa35d1ff613b
    bodmer/JPEGDecoder@^2.0.0
    tzapu/WiFiManager@^2.0.17
    ricmoo/QRCode@^0.0.1

; 13.3" Spectra-6 colorful, 1200x1600 (default kit)
[env:ee02]
extends = xiao_base
build_flags =
    -DBOARD_SCREEN_COMBO=510
    -DUSE_XIAO_EPAPER_DISPLAY_BOARD_EE02
    -DAP_NAME_STR=\"EE02-Setup\"
    -DDEFAULT_DEVICE_NAME_STR=\"ee02\"
    -DBOARD_MODEL_STR=\"EE02\"

; 10.3" ED103TC2 16-level grayscale, 1872x1404
[env:ee03]
extends = xiao_base
build_flags =
    -DBOARD_SCREEN_COMBO=511
    -DUSE_XIAO_EPAPER_DISPLAY_BOARD_EE03
    -DAP_NAME_STR=\"EE03-Setup\"
    -DDEFAULT_DEVICE_NAME_STR=\"ee03\"
    -DBOARD_MODEL_STR=\"EE03\"

; EE04/EE05 are universal 24/50-pin driver boards supporting ~10 panels each;
; default here is Seeed's own cookbook panel, 7.5" mono UC8179, 800x480.
; To use a different supported panel, copy this block and change only
; BOARD_SCREEN_COMBO — see docs/panel-combos.md.
[env:ee04]
extends = xiao_base
build_flags =
    -DBOARD_SCREEN_COMBO=502
    -DUSE_XIAO_EPAPER_DISPLAY_BOARD_EE04
    -DAP_NAME_STR=\"EE04-Setup\"
    -DDEFAULT_DEVICE_NAME_STR=\"ee04\"
    -DBOARD_MODEL_STR=\"EE04\"

; same default-panel rationale as ee04
[env:ee05]
extends = xiao_base
build_flags =
    -DBOARD_SCREEN_COMBO=502
    -DUSE_XIAO_EPAPER_DISPLAY_BOARD_EE05
    -DAP_NAME_STR=\"EE05-Setup\"
    -DDEFAULT_DEVICE_NAME_STR=\"ee05\"
    -DBOARD_MODEL_STR=\"EE05\"

; Host-side unit tests for the pure logic in src/logic/ (no Arduino deps).
; Deliberately does not extend xiao_base — no ESP32 board/framework/lib_deps.
[env:native]
platform = native
test_framework = unity
test_build_src = false
build_src_filter = -<*>
build_flags = -std=gnu++17 -I src
