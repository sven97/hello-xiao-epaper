<svg width="900" height="1150" viewBox="0 0 900 1150" xmlns="http://www.w3.org/2000/svg">
  <title>openee02 frame, illustrated — not a photo</title>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f2ec"/>
      <stop offset="1" stop-color="#e9e5da"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="210" y="160" width="480" height="653" rx="4"/>
    </clipPath>
    <pattern id="dither" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="4" fill="#fdfdf8" opacity="0.6"/>
      <rect x="4" y="4" width="4" height="4" fill="#fdfdf8" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="900" height="1150" fill="url(#wall)"/>

  <!-- frame silhouette, drop-shadowed onto the wall -->
  <g filter="url(#shadow)">
    <rect x="190" y="140" width="520" height="693" rx="10" fill="#17181a"/>
  </g>
  <rect x="190" y="140" width="520" height="693" rx="10" fill="#17181a"/>
  <rect x="210" y="160" width="480" height="653" rx="4" fill="#fdfdf8"/>

  <!-- sample scene in the panel's six flat colors, clipped to the screen -->
  <g clip-path="url(#screenClip)">
    <rect x="210" y="160" width="480" height="653" fill="#fdfdf8"/>
    <circle cx="560" cy="290" r="54" fill="#f4c31e"/>
    <polygon points="210,520 360,330 460,470 560,300 690,520" fill="#111214"/>
    <rect x="210" y="430" width="480" height="90" fill="#1b4fdc"/>
    <rect x="210" y="422" width="480" height="8" fill="url(#dither)"/>
    <polygon points="210,560 330,460 470,560 600,480 690,560 690,813 210,813" fill="#1c8a3b"/>
    <path d="M420 250 q14 -14 28 0 q-14 6 -28 0 z" fill="#d21f2d"/>
  </g>

  <rect x="210" y="160" width="480" height="653" rx="4" fill="none" stroke="#000" stroke-opacity="0.15" stroke-width="2"/>

  <!-- status LED -->
  <circle cx="675" cy="175" r="5" fill="#666"/>

  <!-- wall-mount screws -->
  <circle cx="230" cy="160" r="4" fill="#3a3a3a"/>
  <circle cx="670" cy="160" r="4" fill="#3a3a3a"/>

  <!-- three physical buttons on the board edge -->
  <g font-family="Verdana, sans-serif" font-size="20" fill="#333">
    <rect x="712" y="330" width="14" height="46" rx="6" fill="#2b2b2b"/>
    <text x="736" y="360">KEY1</text>

    <rect x="712" y="470" width="14" height="46" rx="6" fill="#2b2b2b"/>
    <text x="736" y="500">KEY2</text>

    <rect x="712" y="610" width="14" height="46" rx="6" fill="#2b2b2b"/>
    <text x="736" y="640">KEY3</text>
  </g>
</svg>
